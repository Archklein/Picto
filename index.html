<!doctype html>
<html lang="en">
  <head>
    <script
      src="https://kit.fontawesome.com/771fd4cddf.js"
      crossorigin="anonymous"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

      </div>

      <div class="menus_list">

        <div class="menu_list_content">

        </div>
      </div>

    <nav class="nav_bottom">
      <div class="nav_bottom_wrapper">

          <a href="#"><i class="fa-regular fa-house fa-lg"></i></a>
        </div>
        <div class="bottom_nav_icons" id="icon2">
          <a href="#"><i class="fa-solid fa-upload fa-lg"></i></a>
        </div>
        <div class="bottom_nav_icons" id="icon3">
