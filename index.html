<!doctype html>
<html lang="en">
  <head>
    <script
      src="https://kit.fontawesome.com/771fd4cddf.js"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://kit.fontawesome.com/771fd4cddf.js"
      crossorigin="anonymous"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Picto - Localized PCT Market</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="nav_top">
      <div class="nav_top_wrapper">
        <div class="logo_wrapper">
          <div class="logo">
            <img src="images/Picto_logo1.png" alt="" />
          </div>
        </div>

        <div class="nav_top_content">
          <button id="notification" class="nav_top_content" type="button">
            <i class="fa-regular fa-bell fa-lg"></i>
          </button>
        </div>
        <div class="nav_top_content">
          <button id="menu" class="nav_top_content" type="button">
            <i id="menu_icon" class="fa-solid fa-bars fa-lg"></i>
          </button>
        </div>
      </div>
    </nav>

    <header class="hero_section">
      <div class="hero_section_wrapper">
        <div class="hero_contents">
          <h1>
            Buy Here.<br />
            Sell Here.<br />
            Succeed Here.
          </h1>
          <p>
            The campus marketplace for PCT. List your items, set your price, and
            arrange safe campus drop-offs—no awkward negotiations required.
          </p>
        </div>
      </div>
    </header>

    <section class="PCT_img_container">
      <div class="PCT_img_wrapper">
        <div class="PCT_img">
          <img src="images/PCT_Bannner.png" alt="" />
          <div class="PCT_img_contents">
            <h2>Want to Sell Something?</h2>
            <p>PCT's Localized Market</p>
            <button id="PCT_img_btn" type="button">List an Item</button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
